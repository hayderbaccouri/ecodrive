version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecodrive
      MYSQL_USER: ecodrive
      MYSQL_PASSWORD: ecodrive_pass
    volumes:
      - ./base-de-donnees:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"

  web:
    build: .
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:cached
    environment:
      DB_HOST: db
      DB_USER: ecodrive
      DB_PASS: ecodrive_pass
      DB_NAME: ecodrive
