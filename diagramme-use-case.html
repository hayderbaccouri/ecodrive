<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagramme de cas d'utilisation — EcoDrive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0c0e; display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 25px;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  .canvas {
    max-width: 1100px; width: 100%;
    background: #0f1215; border-radius: 24px; padding: 30px 25px 35px;
    border: 1px solid #1e2a2a;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
  }
  .canvas-title {
    text-align: center; margin-bottom: 20px;
    font-size: 13px; letter-spacing: 3px; color: #445; text-transform: uppercase;
  }
  .svg-wrap { width: 100%; overflow: visible; }
  .svg-wrap svg { width: 100%; height: auto; display: block; }

  .actor-stick { fill: none; stroke: #00e5a0; stroke-width: 2; }
  .actor-label { fill: #00e5a0; font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: 600; text-anchor: middle; }

  .uc-border { fill: none; stroke: #4488aa; stroke-width: 1.5; }
  .uc-bg { fill: #0f1a20; }
  .uc-text { fill: #bbd; font-family: 'Segoe UI', sans-serif; font-size: 10.5px; text-anchor: middle; }

  .uc-border-visitor { stroke: #4488aa; }
  .uc-bg-visitor { fill: #0f1a20; }
  .uc-text-visitor { fill: #99ccdd; }

  .uc-border-client { stroke: #e5a000; }
  .uc-bg-client { fill: #1a1810; }
  .uc-text-client { fill: #ddbb77; }

  .uc-border-admin { stroke: #00e5a0; }
  .uc-bg-admin { fill: #0d1a16; }
  .uc-text-admin { fill: #88ddbb; }

  .include-arrow { stroke: #446; stroke-width: 1; fill: none; stroke-dasharray: 5,3; }
  .extend-arrow { stroke: #446; stroke-width: 1; fill: none; stroke-dasharray: 3,3; }
  .assoc-line { stroke: #446; stroke-width: 1.5; fill: none; }
  .include-label { fill: #667; font-family: 'Segoe UI', sans-serif; font-size: 8px; }
  .extend-label { fill: #667; font-family: 'Segoe UI', sans-serif; font-size: 8px; }

  .system-box { fill: none; stroke: #334; stroke-width: 1.5; rx: 12; ry: 12; stroke-dasharray: 6,4; }

  .section-label { fill: #445; font-family: 'Segoe UI', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 2px; }

  @media print {
    body { background: #fff; }
    .canvas { box-shadow: none; border: 1px solid #ccc; background: #fff; }
    .uc-bg-visitor { fill: #f0f6f8; } .uc-border-visitor { stroke: #2a6a8a; } .uc-text-visitor { fill: #1a4a5a; }
    .uc-bg-client { fill: #f8f4e8; } .uc-border-client { stroke: #8a7a20; } .uc-text-client { fill: #5a4a10; }
    .uc-bg-admin { fill: #e8f4f0; } .uc-border-admin { stroke: #1a6a4a; } .uc-text-admin { fill: #0a4a2a; }
    .actor-stick { stroke: #333; } .actor-label { fill: #333; }
    .system-box { stroke: #999; }
    .section-label { fill: #888; }
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="canvas-title">Diagramme de cas d'utilisation — EcoDrive</div>
  <div class="svg-wrap">
    <svg viewBox="0 0 1050 650" xmlns="http://www.w3.org/2000/svg">

      <!-- Système -->
      <rect class="system-box" x="80" y="30" width="890" height="590"/>

      <!-- ============================================ -->
      <!-- ACTEUR : Visiteur                           -->
      <!-- ============================================ -->
      <g transform="translate(1070, 100)">
        <circle class="actor-stick" cx="0" cy="-30" r="8"/>
        <line class="actor-stick" x1="0" y1="-22" x2="0" y2="10"/>
        <line class="actor-stick" x1="-15" y1="-10" x2="15" y2="-10"/>
        <line class="actor-stick" x1="0" y1="10" x2="-12" y2="30"/>
        <line class="actor-stick" x1="0" y1="10" x2="12" y2="30"/>
        <text class="actor-label" x="0" y="45" fill="#4488aa">Visiteur</text>
      </g>

      <!-- ============================================ -->
      <!-- ACTEUR : Client                             -->
      <!-- ============================================ -->
      <g transform="translate(1070, 260)">
        <circle class="actor-stick" cx="0" cy="-30" r="8"/>
        <line class="actor-stick" x1="0" y1="-22" x2="0" y2="10"/>
        <line class="actor-stick" x1="-15" y1="-10" x2="15" y2="-10"/>
        <line class="actor-stick" x1="0" y1="10" x2="-12" y2="30"/>
        <line class="actor-stick" x1="0" y1="10" x2="12" y2="30"/>
        <text class="actor-label" x="0" y="45" fill="#e5a000">Client</text>
      </g>

      <!-- ============================================ -->
      <!-- ACTEUR : Admin                              -->
      <!-- ============================================ -->
      <g transform="translate(1070, 480)">
        <circle class="actor-stick" cx="0" cy="-30" r="8"/>
        <line class="actor-stick" x1="0" y1="-22" x2="0" y2="10"/>
        <line class="actor-stick" x1="-15" y1="-10" x2="15" y2="-10"/>
        <line class="actor-stick" x1="0" y1="10" x2="-12" y2="30"/>
        <line class="actor-stick" x1="0" y1="10" x2="12" y2="30"/>
        <text class="actor-label" x="0" y="45" fill="#00e5a0">Administrateur</text>
      </g>

      <!-- ============================================ -->
      <!-- CAS D'USAGE — VISITEUR (bleu)               -->
      <!-- ============================================ -->

      <!-- 1. Consulter l'accueil -->
      <g transform="translate(140, 70)">
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <rect class="uc-bg uc-bg-visitor" x="0" y="0" width="150" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <text class="uc-text uc-text-visitor" x="75" y="16">Consulter</text>
        <text class="uc-text uc-text-visitor" x="75" y="30">l'accueil</text>
      </g>

      <!-- 2. Parcourir le catalogue -->
      <g transform="translate(140, 130)">
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <rect class="uc-bg uc-bg-visitor" x="0" y="0" width="150" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <text class="uc-text uc-text-visitor" x="75" y="16">Parcourir le</text>
        <text class="uc-text uc-text-visitor" x="75" y="30">catalogue</text>
      </g>

      <!-- 3. Filtrer / Trier -->
      <g transform="translate(140, 190)">
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <rect class="uc-bg uc-bg-visitor" x="0" y="0" width="150" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <text class="uc-text uc-text-visitor" x="75" y="16">Filtrer / Trier</text>
        <text class="uc-text uc-text-visitor" x="75" y="30">les voitures</text>
      </g>

      <!-- 4. Voir fiche détail -->
      <g transform="translate(340, 70)">
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <rect class="uc-bg uc-bg-visitor" x="0" y="0" width="150" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <text class="uc-text uc-text-visitor" x="75" y="16">Voir fiche</text>
        <text class="uc-text uc-text-visitor" x="75" y="30">détail voiture</text>
      </g>

      <!-- 5. Voir bornes -->
      <g transform="translate(340, 130)">
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <rect class="uc-bg uc-bg-visitor" x="0" y="0" width="150" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <text class="uc-text uc-text-visitor" x="75" y="16">Consulter les</text>
        <text class="uc-text uc-text-visitor" x="75" y="30">bornes</text>
      </g>

      <!-- 6. S'inscrire -->
      <g transform="translate(340, 190)">
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <rect class="uc-bg uc-bg-visitor" x="0" y="0" width="150" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-visitor" cx="75" cy="20" rx="75" ry="20"/>
        <text class="uc-text uc-text-visitor" x="75" y="16">S'inscrire</text>
        <text class="uc-text uc-text-visitor" x="75" y="30">(créer un compte)</text>
      </g>

      <!-- 7. Contact -->
      <g transform="translate(540, 70)">
        <ellipse class="uc-border uc-border-visitor" cx="65" cy="20" rx="65" ry="20"/>
        <rect class="uc-bg uc-bg-visitor" x="0" y="0" width="130" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-visitor" cx="65" cy="20" rx="65" ry="20"/>
        <text class="uc-text uc-text-visitor" x="65" y="16">Nous</text>
        <text class="uc-text uc-text-visitor" x="65" y="30">contacter</text>
      </g>

      <!-- Section label visiteur -->
      <text class="section-label" x="140" y="55" fill="#4488aa">━ VISITEUR (non connecté) ━</text>

      <!-- ============================================ -->
      <!-- CAS D'USAGE — CLIENT (orange)               -->
      <!-- ============================================ -->

      <!-- Section label client -->
      <text class="section-label" x="565" y="170" fill="#e5a000">━ CLIENT (connecté) ━</text>

      <!-- 8. Se connecter -->
      <g transform="translate(540, 190)">
        <ellipse class="uc-border uc-border-client" cx="65" cy="20" rx="65" ry="20"/>
        <rect class="uc-bg uc-bg-client" x="0" y="0" width="130" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-client" cx="65" cy="20" rx="65" ry="20"/>
        <text class="uc-text uc-text-client" x="65" y="16">Se</text>
        <text class="uc-text uc-text-client" x="65" y="30">connecter</text>
      </g>

      <!-- 9. Réserver un essai -->
      <g transform="translate(540, 250)">
        <ellipse class="uc-border uc-border-client" cx="75" cy="20" rx="75" ry="20"/>
        <rect class="uc-bg uc-bg-client" x="0" y="0" width="150" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-client" cx="75" cy="20" rx="75" ry="20"/>
        <text class="uc-text uc-text-client" x="75" y="16">Réserver un</text>
        <text class="uc-text uc-text-client" x="75" y="30">essai routier</text>
      </g>

      <!-- 10. Dashboard réservations -->
      <g transform="translate(730, 70)">
        <ellipse class="uc-border uc-border-client" cx="85" cy="20" rx="85" ry="20"/>
        <rect class="uc-bg uc-bg-client" x="0" y="0" width="170" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-client" cx="85" cy="20" rx="85" ry="20"/>
        <text class="uc-text uc-text-client" x="85" y="16">Consulter mes</text>
        <text class="uc-text uc-text-client" x="85" y="30">réservations</text>
      </g>

      <!-- 11. Annuler réservation -->
      <g transform="translate(730, 130)">
        <ellipse class="uc-border uc-border-client" cx="85" cy="20" rx="85" ry="20"/>
        <rect class="uc-bg uc-bg-client" x="0" y="0" width="170" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-client" cx="85" cy="20" rx="85" ry="20"/>
        <text class="uc-text uc-text-client" x="85" y="16">Annuler une</text>
        <text class="uc-text uc-text-client" x="85" y="30">réservation</text>
      </g>

      <!-- 12. Modifier profil -->
      <g transform="translate(730, 190)">
        <ellipse class="uc-border uc-border-client" cx="85" cy="20" rx="85" ry="20"/>
        <rect class="uc-bg uc-bg-client" x="0" y="0" width="170" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-client" cx="85" cy="20" rx="85" ry="20"/>
        <text class="uc-text uc-text-client" x="85" y="16">Modifier mon</text>
        <text class="uc-text uc-text-client" x="85" y="30">profil</text>
      </g>

      <!-- 13. Mot de passe oublié -->
      <g transform="translate(540, 130)">
        <ellipse class="uc-border uc-border-client" cx="65" cy="20" rx="65" ry="20"/>
        <rect class="uc-bg uc-bg-client" x="0" y="0" width="130" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-client" cx="65" cy="20" rx="65" ry="20"/>
        <text class="uc-text uc-text-client" x="65" y="16">Mot de passe</text>
        <text class="uc-text uc-text-client" x="65" y="30">oublié</text>
      </g>

      <!-- ============================================ -->
      <!-- CAS D'USAGE — ADMIN (vert)                  -->
      <!-- ============================================ -->

      <text class="section-label" x="565" y="370" fill="#00e5a0">━ ADMINISTRATEUR ━</text>

      <!-- 14. CRUD voitures -->
      <g transform="translate(540, 390)">
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <rect class="uc-bg uc-bg-admin" x="0" y="0" width="170" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <text class="uc-text uc-text-admin" x="85" y="16">CRUD</text>
        <text class="uc-text uc-text-admin" x="85" y="30">voitures</text>
      </g>

      <!-- 15. CRUD bornes -->
      <g transform="translate(540, 450)">
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <rect class="uc-bg uc-bg-admin" x="0" y="0" width="170" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <text class="uc-text uc-text-admin" x="85" y="16">CRUD</text>
        <text class="uc-text uc-text-admin" x="85" y="30">bornes</text>
      </g>

      <!-- 16. Gérer réservations -->
      <g transform="translate(730, 390)">
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <rect class="uc-bg uc-bg-admin" x="0" y="0" width="170" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <text class="uc-text uc-text-admin" x="85" y="16">Gérer les</text>
        <text class="uc-text uc-text-admin" x="85" y="30">réservations</text>
      </g>

      <!-- 17. Voir statistiques -->
      <g transform="translate(540, 510)">
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <rect class="uc-bg uc-bg-admin" x="0" y="0" width="170" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <text class="uc-text uc-text-admin" x="85" y="16">Voir les</text>
        <text class="uc-text uc-text-admin" x="85" y="30">statistiques</text>
      </g>

      <!-- 18. Exporter données -->
      <g transform="translate(730, 450)">
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <rect class="uc-bg uc-bg-admin" x="0" y="0" width="170" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <text class="uc-text uc-text-admin" x="85" y="16">Exporter</text>
        <text class="uc-text uc-text-admin" x="85" y="30">les données</text>
      </g>

      <!-- 19. Gérer utilisateurs -->
      <g transform="translate(730, 510)">
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <rect class="uc-bg uc-bg-admin" x="0" y="0" width="170" height="40" rx="20" ry="20"/>
        <ellipse class="uc-border uc-border-admin" cx="85" cy="20" rx="85" ry="20"/>
        <text class="uc-text uc-text-admin" x="85" y="16">Gérer les</text>
        <text class="uc-text uc-text-admin" x="85" y="30">utilisateurs</text>
      </g>

      <!-- ============================================ -->
      <!-- ASSOCIATIONS ACTEURS → CAS                  -->
      <!-- ============================================ -->

      <!-- Visiteur → ses cas -->
      <!-- Consulter accueil -->
      <line class="assoc-line" x1="290" y1="90" x2="340" y2="90"/>
      <!-- Parcourir catalogue -->
      <line class="assoc-line" x1="290" y1="150" x2="340" y2="150"/>
      <!-- Filtrer/Trier -->
      <line class="assoc-line" x1="290" y1="210" x2="340" y2="210"/>

      <!-- Client → ses cas -->
      <!-- Se connecter -->
      <line class="assoc-line" x1="290" y1="260" x2="540" y2="210"/>
      <!-- Réserver essai -->
      <line class="assoc-line" x1="290" y1="270" x2="540" y2="270"/>
      <!-- Mot passe oublié -->
      <line class="assoc-line" x1="290" y1="250" x2="540" y2="150"/>

      <!-- Admin → ses cas -->
      <!-- CRUD voitures -->
      <line class="assoc-line" x1="290" y1="480" x2="540" y2="410"/>
      <!-- CRUD bornes -->
      <line class="assoc-line" x1="290" y1="485" x2="540" y2="470"/>
      <!-- Gérer résa -->
      <line class="assoc-line" x1="290" y1="490" x2="730" y2="410"/>
      <!-- Stats -->
      <line class="assoc-line" x1="290" y1="495" x2="540" y2="530"/>
      <!-- Export -->
      <line class="assoc-line" x1="290" y1="500" x2="730" y2="470"/>
      <!-- Gérer users -->
      <line class="assoc-line" x1="290" y1="505" x2="730" y2="530"/>

      <!-- ============================================ -->
      <!-- RELATIONS « include » et « extend »          -->
      <!-- ============================================ -->

      <!-- extend: Client → Visiteur (héritage implicite) -->
      <!-- <line class="extend-arrow" x1="1050" y1="125" x2="1050" y2="235"/> -->
      <!-- flèche d'héritage entre acteurs -->
      <line class="assoc-line" x1="1060" y1="130" x2="1060" y2="230"/>
      <polygon points="1055,230 1065,230 1060,220" fill="#446" stroke="none"/>
      <line class="assoc-line" x1="1060" y1="290" x2="1060" y2="450"/>
      <polygon points="1055,450 1065,450 1060,440" fill="#446" stroke="none"/>

      <!-- include: Réserver → Se connecter -->
      <line class="include-arrow" x1="615" y1="260" x2="605" y2="230"/>
      <text class="include-label" x="650" y="250">« include »</text>

      <!-- include: Dashboard → Réserver -->
      <line class="include-arrow" x1="730" y1="100" x2="690" y2="260"/>
      <text class="include-label" x="695" y="180">« include »</text>

    </svg>
  </div>
</div>
</body>
</html>
